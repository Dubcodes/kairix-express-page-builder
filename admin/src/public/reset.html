<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password - Kairix</title>
    <link rel="stylesheet" href="/assets/admin.css">
  </head>
  <body>
    <main class="main">
      <section class="panel narrow">
        <h1>Reset password</h1>
        <p class="muted">Choose a new password from this one-time reset link.</p>
        <form id="resetForm" class="form-grid">
          <label>New password<input name="password" type="password" required minlength="10" autocomplete="new-password"></label>
          <button type="submit">Save new password</button>
        </form>
        <p id="message" class="status"></p>
      </section>
    </main>
    <script>
      const form = document.querySelector("#resetForm");
      const message = document.querySelector("#message");
      const token = new URLSearchParams(location.search).get("token");
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(form));
        const response = await fetch("/api/password-reset/complete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ...data, token })
        });
        const json = await response.json().catch(() => ({}));
        message.textContent = response.ok ? "Password reset. You can now log in." : json.error || "Reset failed.";
        message.classList.toggle("error", !response.ok);
      });
    </script>
  </body>
</html>
