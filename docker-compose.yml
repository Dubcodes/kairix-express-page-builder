services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kairix-express-page-builder-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_PATH: /app/data/kairix.sqlite
      UPLOADS_DIR: /app/uploads
      GENERATED_SITE_DIR: /app/generated-site
      BACKUPS_DIR: /app/data/backups
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      ENABLE_SAMPLE_DATA_TOOLS: ${ENABLE_SAMPLE_DATA_TOOLS:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:4321}
      PUBLIC_SITE_BASE_PATH: ${PUBLIC_SITE_BASE_PATH-/preview}
      ADMIN_BASE_URL: ${ADMIN_BASE_URL:-http://localhost:8080}
      SESSION_SECRET: ${SESSION_SECRET:-}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:-}
      ALIEXPRESS_AUTH_URL: ${ALIEXPRESS_AUTH_URL:-}
      ALIEXPRESS_TOKEN_URL: ${ALIEXPRESS_TOKEN_URL:-}
      ALIEXPRESS_API_URL: ${ALIEXPRESS_API_URL:-}
    ports:
      - "${ADMIN_PORT:-8080}:8080"
    volumes:
      - kairix-data:/app/data
      - kairix-uploads:/app/uploads
      - kairix-generated-site:/app/generated-site
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

  public-preview:
    build:
      context: .
      dockerfile: docker/nginx-preview.Dockerfile
    container_name: kairix-express-page-builder-preview
    restart: unless-stopped
    ports:
      - "${PUBLIC_PREVIEW_PORT:-4321}:80"
    volumes:
      - kairix-generated-site:/usr/share/nginx/html:ro
    depends_on:
      admin:
        condition: service_healthy

volumes:
  kairix-data:
  kairix-uploads:
  kairix-generated-site:
